<script>
let kilo = 0;
let dos = 0;

// SONIDO
let sonido = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");

// CARGAR DATOS GUARDADOS
window.onload = function() {
    kilo = parseInt(localStorage.getItem("kilo")) || 0;
    dos = parseInt(localStorage.getItem("dos")) || 0;
    actualizar();
};

// GUARDAR DATOS
function guardar() {
    localStorage.setItem("kilo", kilo);
    localStorage.setItem("dos", dos);
}

// AGREGAR PRODUCTOS
function agregar(tipo) {
    sonido.play();

    if (tipo === "1kg") kilo++;
    if (tipo === "2kg") dos++;

    guardar();
    actualizar();

    alert("Producto agregado 🧊");
}

// ACTUALIZAR CARRITO
function actualizar() {
    let k = document.getElementById("kilo");
    let d = document.getElementById("dos");
    let t = document.getElementById("total");

    if (k) k.innerText = kilo;
    if (d) d.innerText = dos;

    let total = (kilo * 2000) + (dos * 5000);
    if (t) t.innerText = "$" + total;
}

// COMPRAR
function comprar() {
    if (kilo === 0 && dos === 0) {
        alert("No has agregado productos");
        return;
    }

    let mensaje = "Hola, quiero comprar:\n";
    if (kilo > 0) mensaje += "- " + kilo + " bolsas de 1 Kg\n";
    if (dos > 0) mensaje += "- " + dos + " bolsas de 2.6 Kg\n";

    let url = "https://wa.me/573117881274?text=" + encodeURIComponent(mensaje);
    window.open(url);
}

// CONTACTO
function contacto() {
    window.open("https://wa.me/573117881274");
}
</script>

</body>
</html>

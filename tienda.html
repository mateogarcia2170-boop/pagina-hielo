<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tienda - Hielo de la Tata</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(#0A1F44, #1565C0);
            color: white;
            text-align: center;
        }

        .nav {
            background: #0d47a1;
            padding: 15px;
        }

        .contenedor {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .producto {
            background: white;
            color: #0A1F44;
            width: 260px;
            margin: 20px;
            padding: 20px;
            border-radius: 20px;
        }

        button {
            background-color: #25D366;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .carrito {
            position: fixed;
            top: 10px;
            right: 10px;
            background: white;
            color: black;
            padding: 15px;
            border-radius: 15px;
        }
    </style>
</head>

<body>

    <div class="nav">
        🧊 Hielo de la Tata | <a href="index.html" style="color:white;">Inicio</a>
    </div>

    <div class="carrito">
        <h4>🛒 Carrito</h4>
        <p>1 Kg: <span id="kilo">0</span></p>
        <p>2.6 Kg: <span id="dos">0</span></p>
        <p>Total: <span id="total">$0</span></p>
    </div>

    <h2>Productos</h2>

    <div class="contenedor">

        <div class="producto">
            <h3>Hielo 1 Kg</h3>
            <p>$2000</p>
            <button onclick="agregar('1kg')">Agregar</button>
        </div>

        <div class="producto">
            <h3>Hielo 2.6 Kg</h3>
            <p>$5000</p>
            <button onclick="agregar('2kg')">Agregar</button>
        </div>

    </div>

    <br>

    <button onclick="comprar()">Comprar por WhatsApp</button>

    <script>
        let kilo = 0;
        let dos = 0;

        // Cargar datos guardados
        window.onload = function() {
            kilo = parseInt(localStorage.getItem("kilo")) || 0;
            dos = parseInt(localStorage.getItem("dos")) || 0;
            actualizar();
        };

        // Guardar
        function guardar() {
            localStorage.setItem("kilo", kilo);
            localStorage.setItem("dos", dos);
        }

        // Agregar productos
        function agregar(tipo) {
            if (tipo === "1kg") kilo++;
            if (tipo === "2kg") dos++;

            guardar();
            actualizar();
        }

        // Actualizar carrito
        function actualizar() {
            document.getElementById("kilo").innerText = kilo;
            document.getElementById("dos").innerText = dos;

            let total = (kilo * 2000) + (dos * 5000);
            document.getElementById("total").innerText = "$" + total;
        }

        // Comprar
        function comprar() {
            if (kilo === 0 && dos === 0) {
                alert("No has agregado productos");
                return;
            }

            let mensaje = "Hola, quiero comprar:\n";
            if (kilo > 0) mensaje += "- " + kilo + " bolsas de 1 Kg\n";
            if (dos > 0) mensaje += "- " + dos + " bolsas de 2.6 Kg\n";

            let url = "https://wa.me/573117881274?text=" + encodeURIComponent(mensaje);
            window.open(url);
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Hielo de la Tata</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(#0A1F44, #1565C0);
            color: white;
        }

        .nav {
            background: #0d47a1;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .contenedor {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .producto {
            background: white;
            color: #0A1F44;
            width: 260px;
            margin: 20px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
        }

        button {
            background-color: #25D366;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .carrito {
            position: fixed;
            top: 10px;
            right: 10px;
            background: white;
            color: black;
            padding: 15px;
            border-radius: 15px;
            width: 200px;
        }

        .mapa {
            margin: 30px;
            text-align: center;
        }

        .whatsapp {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #25D366;
            padding: 15px;
            border-radius: 50%;
            font-size: 25px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="nav">
        <div>🧊 Hielo de la Tata</div>
        <a href="index.html" style="color:white;">Inicio</a>
    </div>

    <div class="carrito">
        <h4>🛒 Carrito</h4>
        <p>1 Kg: <span id="kilo">0</span></p>
        <p>2.6 Kg: <span id="dos">0</span></p>
        <hr>
        <p>Total: <span id="total">0</span></p>
    </div>

    <h2 style="text-align:center;">Productos</h2>

    <div class="contenedor">

        <div class="producto">
            <h3>Hielo 1 Kg</h3>
            <p>$2000</p>
            <button onclick="agregar('1kg')">Agregar</button>
        </div>

        <div class="producto">
            <h3>Hielo 2.6 Kg</h3>
            <p>$5000</p>
            <button onclick="agregar('2kg')">Agregar</button>
        </div>

    </div>

    <div style="text-align:center;">
        <button onclick="comprar()">Comprar por WhatsApp</button>
    </div>

    <div class="mapa">
        <h3>📍 Ubicación</h3>
        <iframe 
        src="https://maps.google.com/maps?q=calle%2040B%2048A%2057%20Rionegro%20Antioquia&t=&z=17&ie=UTF8&iwloc=&output=embed"
        width="80%" height="250"></iframe>
    </div>

    <div class="whatsapp" onclick="contacto()">💬</div>

    <script>
        let kilo = 0;
        let dos = 0;

        function agregar(tipo) {
            if (tipo === "1kg") kilo++;
            if (tipo === "2kg") dos++;

            actualizar();
        }

        function actualizar() {
            document.getElementById("kilo").innerText = kilo;
            document.getElementById("dos").innerText = dos;

            let total = (kilo * 2000) + (dos * 5000);
            document.getElementById("total").innerText = "$" + total;
        }

        function comprar() {
            if (kilo === 0 && dos === 0) {
                alert("No has agregado productos");
                return;
            }

            let mensaje = "Hola, quiero comprar:\n";
            if (kilo > 0) mensaje += "- " + kilo + " bolsas de 1 Kg\n";
            if (dos > 0) mensaje += "- " + dos + " bolsas de 2.6 Kg\n";

            let url = "https://wa.me/573117881274?text=" + encodeURIComponent(mensaje);
            window.open(url);
        }

        function contacto() {
            window.open("https://wa.me/573117881274");
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hielo de la Tata</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1565C0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(#0A1F44, #1565C0);
            color: white;
            text-align: center;
        }

        .contenedor {
            margin-top: 100px;
            animation: aparecer 1.5s;
        }

        @keyframes aparecer {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        img {
            width: 120px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 32px;
        }

        p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        button {
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
        }

        .btn-tienda {
            background: white;
            color: #1565C0;
        }

        .btn-instalar {
            background: #25D366;
            color: white;
            display: none;
        }

        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 10px;
            background: #0d47a1;
        }

        .whatsapp {
            position: fixed;
            bottom: 70px;
            right: 20px;
            background: #25D366;
            padding: 15px;
            border-radius: 50%;
            font-size: 25px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="contenedor">
        <img src="logo.png">

        <h1>Bienvenidos a Hielo de la Tata</h1>
        <p>Hielo rápido, económico y de calidad 🧊</p>

        <button class="btn-tienda" onclick="window.location='tienda.html'">
            Entrar a la tienda
        </button>

        <button id="instalarBtn" class="btn-instalar">
            Instalar App
        </button>
    </div>

    <div class="footer">
        📞 311 788 1274
    </div>

    <div class="whatsapp" onclick="contacto()">💬</div>

    <script>
        function contacto() {
            window.open("https://wa.me/573117881274");
        }

        // SERVICE WORKER
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }

        // BOTÓN INSTALAR APP
        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById("instalarBtn").style.display = "inline-block";
        });

        document.getElementById("instalarBtn").addEventListener("click", () => {
            deferredPrompt.prompt();
        });
    </script>

</body>
</html>
